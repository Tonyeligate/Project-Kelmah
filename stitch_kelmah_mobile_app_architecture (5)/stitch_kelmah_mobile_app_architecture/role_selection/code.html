<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kelmah - Role Selection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "colors": {
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-container-high": "#e8e8e8",
                        "text-body": "#4B5563",
                        "on-primary-fixed-variant": "#544600",
                        "surface-muted": "#F3F4F6",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "inverse-surface": "#2f3131",
                        "surface-tint": "#705d00",
                        "on-surface-variant": "#4d4732",
                        "surface": "#f9f9f9",
                        "primary": "#705d00",
                        "on-primary": "#ffffff",
                        "status-success": "#10B981",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#f0f1f1",
                        "on-secondary-container": "#636262",
                        "outline-variant": "#d0c6ab",
                        "primary-container": "#ffd700",
                        "on-tertiary-fixed-variant": "#474740",
                        "on-surface": "#1a1c1c",

                        "on-tertiary-container": "#5f5f58",

                        "secondary-container": "#e2dfde",

                        "inverse-primary": "#e9c400",
                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#221b00",
                        "primary-fixed": "#ffe16d",
                        "tertiary-fixed-dim": "#c8c7bd",
                        "tertiary": "#5f5f57",
                        "on-tertiary-fixed": "#1b1c16",
                        "on-primary-container": "#705e00",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#e9c400",
                        "surface-bright": "#f9f9f9",
                        "status-info": "#3B82F6",
                        "secondary-fixed": "#e5e2e1",
                        "on-background": "#1a1c1c",

                        "surface-container-lowest": "#ffffff",
                        "on-error": "#ffffff",
                        "background": "#f9f9f9",

                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target": "48px",

<style>
        .role-card.selected {
            border-color: #1a1c1c;
            background-color: #f9f9f9;
            box-shadow: 0 0 0 2px #ffd700;
        }
        .role-card.selected .card-icon {
            color: #705d00;
        }
        .role-card:hover:not(.selected) {
            border-color: #e2e2e2;
            background-color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Top App Bar - Suppressed for Onboarding/Transactional screen as per guidelines -->
<main class="w-full max-w-md mx-auto flex flex-col gap-8">
<!-- Header Section -->
<header class="text-center flex flex-col gap-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary">Join Kelmah</h1>
<p class="font-body-md text-body-md text-text-body">Select how you want to use the platform.</p>
</header>
<!-- Role Selection Cards -->
<div class="flex flex-col gap-4">
<!-- Hire Card -->
<button class="role-card w-full text-left bg-surface-container-lowest border border-surface-variant rounded-xl p-6 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary-container group relative overflow-hidden" onclick="selectRole(this, 'hire')" type="button">
<div class="flex items-start gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center shrink-0 card-icon text-secondary transition-colors duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">business_center</span>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-headline-md text-headline-md text-on-surface">I want to Hire</h2>
<p class="font-body-md text-body-md text-text-body">Find skilled artisans and contractors for your projects.</p>
</div>
</div>
<!-- Selection Indicator -->
<div class="absolute top-6 right-6 opacity-0 transition-opacity duration-200 indicator">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Work Card -->
<button class="role-card w-full text-left bg-surface-container-lowest border border-surface-variant rounded-xl p-6 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-primary-container group relative overflow-hidden" onclick="selectRole(this, 'work')" type="button">
<div class="flex items-start gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center shrink-0 card-icon text-secondary transition-colors duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">handyman</span>
</div>
<div class="flex flex-col gap-1">
<h2 class="font-headline-md text-headline-md text-on-surface">I want to Work</h2>
<p class="font-body-md text-body-md text-text-body">Offer your skills, find jobs, and manage your contracts.</p>
</div>
</div>
<!-- Selection Indicator -->
<div class="absolute top-6 right-6 opacity-0 transition-opacity duration-200 indicator">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</div>
<!-- Action Button -->
<div class="mt-4">
<button class="w-full h-touch-target bg-surface-container-high text-on-surface-variant font-label-md text-label-md rounded-DEFAULT transition-all duration-200 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed" disabled="" id="continue-btn" type="button">
                Continue
            </button>
</div>
<!-- Login Link -->
<div class="text-center mt-2">
<p class="font-body-md text-body-md text-text-body">
                Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</div>
</main>
<!-- Bottom Nav Bar - Suppressed for Onboarding/Transactional screen as per guidelines -->
<script>
        let selectedRole = null;

        function selectRole(element, role) {
            // Remove selected class from all cards
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('selected');
                card.querySelector('.indicator').classList.remove('opacity-100');
                card.querySelector('.indicator').classList.add('opacity-0');
            });

            // Add selected class to clicked card
            element.classList.add('selected');
            element.querySelector('.indicator').classList.remove('opacity-0');
            element.querySelector('.indicator').classList.add('opacity-100');

            // Update selected role
            selectedRole = role;

            // Enable continue button
            const continueBtn = document.getElementById('continue-btn');
            continueBtn.disabled = false;
            
            // Update button styles to primary active state based on brand guidelines
            continueBtn.classList.remove('bg-surface-container-high', 'text-on-surface-variant');
            continueBtn.classList.add('bg-primary-container', 'text-on-background', 'font-bold');
        }
    </script>
</body></html>

<script>
        // Star Rating Logic
        const stars = document.querySelectorAll('#mainRating span');
        let currentRating = 0;

        stars.forEach(star => {
            star.addEventListener('click', (e) => {
                const value = parseInt(e.target.dataset.value);
                currentRating = value;
                updateStars();
                updateProgress();
            });

            star.addEventListener('mouseenter', (e) => {
                const value = parseInt(e.target.dataset.value);
                highlightStars(value);
            });

            star.addEventListener('mouseleave', () => {
                updateStars();
            });
        });

        function highlightStars(value) {
            stars.forEach(s => {
                const sValue = parseInt(s.dataset.value);
                if (sValue <= value) {
                    s.style.color = '#ffd700';
                    s.style.fontVariationSettings = "'FILL' 1";
                } else {
                    s.style.color = '';
                    s.style.fontVariationSettings = "'FILL' 0";
                }
            });
        }

        function updateStars() {
            stars.forEach(s => {
                const sValue = parseInt(s.dataset.value);
                if (sValue <= currentRating) {
                    s.style.color = '#ffd700';
                    s.style.fontVariationSettings = "'FILL' 1";
                } else {
                    s.style.color = '';
                    s.style.fontVariationSettings = "'FILL' 0";
                }
            });
        }

        // Tag Toggle Logic
        const tags = document.querySelectorAll('.tag-btn');
        let selectedTags = 0;

        tags.forEach(tag => {
            tag.addEventListener('click', () => {
                tag.classList.toggle('bg-primary-container');
                tag.classList.toggle('text-on-primary-fixed');
                tag.classList.toggle('border-primary-container');
                
                tag.classList.toggle('bg-surface-container-lowest');
                tag.classList.toggle('text-on-surface-variant');
                tag.classList.toggle('border-outline-variant');

                if (tag.classList.contains('bg-primary-container')) {
                    selectedTags++;
                } else {
                    selectedTags--;
                }
                updateProgress();
            });
        });

        // Textarea Logic
        const textarea = document.getElementById('reviewText');
        textarea.addEventListener('input', updateProgress);

        // Progress Bar Logic
        function updateProgress() {
            let progress = 0;
            if (currentRating > 0) progress += 33;
            if (selectedTags > 0) progress += 33;
            if (textarea.value.trim().length > 10) progress += 34;

            document.getElementById('progressBar').style.width = `${progress}%`;
        }
        
        // Initial setup
        updateProgress();
    </script>

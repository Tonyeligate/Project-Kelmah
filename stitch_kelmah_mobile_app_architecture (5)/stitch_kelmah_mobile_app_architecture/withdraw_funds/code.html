        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col pb-[80px] md:pb-0">
<!-- Top App Bar -->
<header class="w-full top-0 sticky bg-surface dark:bg-inverse-surface border-b border-outline-variant flex justify-between items-center px-gutter h-touch-target z-50">
<div class="flex items-center">
<button aria-label="Go back" class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors duration-200 active:opacity-70 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="ml-2 font-headline-lg-mobile text-headline-lg-mobile md:font-headline-md md:text-headline-md text-primary dark:text-primary-fixed">Withdraw Funds</h1>
</div>
<button aria-label="Help" class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container dark:hover:bg-surface-variant transition-colors duration-200 active:opacity-70 rounded-full">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</header>
<main class="flex-grow w-full max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-6">
<div class="max-w-xl mx-auto space-y-6">
<!-- Balance Card -->
<section class="bg-surface-container-lowest rounded-xl p-6 border border-surface-variant shadow-[0_4px_20px_rgba(0,0,0,0.04)]">
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-2">Available Balance</h2>
<div class="flex items-baseline space-x-2">
<span class="font-display-lg text-display-lg text-on-background">$1,245.00</span>
<span class="font-body-md text-body-md text-status-success flex items-center">
<span class="material-symbols-outlined text-sm mr-1" data-icon="verified">verified</span> Ready
                    </span>
</div>
</section>
<!-- Withdrawal Form -->
<form class="space-y-6 bg-surface-container-lowest rounded-xl p-6 border border-surface-variant shadow-[0_4px_20px_rgba(0,0,0,0.04)]">
<!-- Amount -->
<div>
<label class="block font-label-md text-label-md text-on-background mb-2" for="amount">Amount to Withdraw</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="font-body-lg text-body-lg text-on-surface-variant">$</span>
</div>
<input class="block w-full pl-8 pr-4 py-3 h-touch-target bg-surface border border-outline-variant rounded-lg font-body-lg text-body-lg text-on-background focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-on-background transition-colors" id="amount" name="amount" placeholder="0.00" required="" type="number"/>
</div>
<p class="mt-2 font-caption text-caption text-on-surface-variant text-right">Min: $10.00 | Max: $1,245.00</p>
</div>
<!-- Payout Method -->
<div>
<label class="block font-label-md text-label-md text-on-background mb-3">Transfer Method</label>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
<label class="relative flex cursor-pointer rounded-lg border border-outline-variant bg-surface p-4 focus-within:ring-2 focus-within:ring-primary-container hover:bg-surface-container-low transition-colors">
<input checked="" class="peer sr-only" name="method" type="radio" value="momo"/>
<div class="flex items-center justify-between w-full">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" data-icon="smartphone">smartphone</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-background">Mobile Money</p>
<p class="font-caption text-caption text-on-surface-variant">Instant</p>
</div>
</div>
<span class="material-symbols-outlined text-primary-container opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-on-background rounded-lg pointer-events-none transition-colors"></div>
</label>
<label class="relative flex cursor-pointer rounded-lg border border-outline-variant bg-surface p-4 focus-within:ring-2 focus-within:ring-primary-container hover:bg-surface-container-low transition-colors">
<input class="peer sr-only" name="method" type="radio" value="bank"/>
<div class="flex items-center justify-between w-full">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
</div>
<div>
<p class="font-label-md text-label-md text-on-background">Bank Transfer</p>
<p class="font-caption text-caption text-on-surface-variant">1-3 Biz Days</p>
</div>
</div>
<span class="material-symbols-outlined text-primary-container opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="absolute inset-0 border-2 border-transparent peer-checked:border-on-background rounded-lg pointer-events-none transition-colors"></div>
</label>
</div>
</div>
<!-- Account Details (Conditional based on method, simplified for mockup) -->
<div class="space-y-4 pt-2 border-t border-surface-variant">
<h3 class="font-label-md text-label-md text-on-background">Recipient Details</h3>
<div>
<label class="block font-caption text-caption text-on-surface-variant mb-1" for="phone">Mobile Number</label>
<input class="block w-full px-4 py-3 h-touch-target bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-background focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-on-background transition-colors" id="phone" name="phone" placeholder="+233 55 123 4567" type="tel"/>
</div>
<div>
<label class="block font-caption text-caption text-on-surface-variant mb-1" for="network">Network Provider</label>
<div class="relative">
<select class="block w-full px-4 py-3 h-touch-target bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-background focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-on-background appearance-none transition-colors" id="network" name="network">
<option value="mtn">MTN MoMo</option>
<option value="vodafone">Telecel Cash</option>
<option value="at">AT Money</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full h-touch-target flex items-center justify-center bg-primary-container text-on-background font-label-md text-label-md rounded-lg hover:bg-primary-fixed-dim transition-colors duration-200 active:scale-[0.98] shadow-sm" type="button">
                        Confirm Withdrawal
                    </button>
<p class="mt-3 text-center font-caption text-caption text-on-surface-variant flex justify-center items-center">
<span class="material-symbols-outlined text-[16px] mr-1" data-icon="lock">lock</span> Secured via Kelmah Pay
                    </p>
</div>
</form>
</div>
</main>
<!-- Bottom Nav Bar (Mobile Only) - Using 'Wallet' as active state since it's a financial transaction related to the wallet -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-2 bg-surface-container-lowest dark:bg-surface-dim z-50 rounded-t-xl shadow-[0_-4px_20px_rgba(0,0,0,0.04)] md:hidden">
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-300 active:scale-95 w-touch-target h-touch-target rounded-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-label-md text-[10px]">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-300 active:scale-95 w-touch-target h-touch-target rounded-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="work">work</span>
<span class="font-label-md text-[10px]">Jobs</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-300 active:scale-95 w-touch-target h-touch-target rounded-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="chat">chat</span>
<span class="font-label-md text-[10px]">Messages</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-4 py-1 transition-all duration-300 active:scale-95 h-touch-target" href="#">
<span class="material-symbols-outlined mb-1" data-icon="account_balance_wallet" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance_wallet</span>
<span class="font-label-md text-[10px]">Wallet</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-all duration-300 active:scale-95 w-touch-target h-touch-target rounded-full" href="#">
<span class="material-symbols-outlined mb-1" data-icon="person">person</span>
<span class="font-label-md text-[10px]">Profile</span>
</a>
</nav>
</body></html>

<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col items-center">
<!-- TopAppBar JSON Component -->
<header class="w-full top-0 sticky bg-surface border-b border-outline-variant flex justify-between items-center px-gutter h-touch-target z-50">
<button class="flex items-center justify-center w-touch-target h-touch-target transition-colors duration-200 active:opacity-70 hover:bg-surface-container text-primary rounded-full">

</button>
<div class="font-headline-lg-mobile text-headline-lg-mobile font-display-lg text-primary tracking-tight">

        </div>
<button class="flex items-center justify-center w-touch-target h-touch-target transition-colors duration-200 active:opacity-70 hover:bg-surface-container text-primary rounded-full">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">notifications</span>
</button>
</header>
<!-- Main Canvas -->
<main class="w-full max-w-[600px] flex-grow px-margin-mobile py-8 flex flex-col items-center">
<!-- Contextual Header -->
<div class="w-full flex justify-center mb-6">
<h1 class="font-headline-md text-headline-md text-on-surface">Transaction Detail</h1>
</div>
<!-- Receipt Card -->
<article class="w-full bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] overflow-hidden border border-surface-container-high relative">
<!-- Amount Section (Yellow Accent) -->
<div class="w-full bg-primary-container p-8 flex flex-col items-center justify-center text-center relative z-10">
<span class="material-symbols-outlined text-[48px] text-on-primary-container mb-4" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="font-body-md text-body-md text-on-primary-container opacity-80 mb-1">Amount Paid</div>
<div class="font-display-lg text-display-lg text-on-primary-container font-bold tracking-tight">
<span class="text-3xl mr-1">GHS</span>450.00
                </div>
<div class="mt-4 px-4 py-1.5 bg-surface-container-lowest text-status-success font-label-md text-label-md rounded-full shadow-sm flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-status-success block"></span>
                    Success
                </div>
</div>
<!-- Perforated Edge Effect -->
<div class="w-full h-6 ticket-edge bg-primary-container relative z-0 -mt-3 rotate-180"></div>
<!-- Details Section -->
<div class="p-6 flex flex-col gap-5 pt-4">
<div class="flex justify-between items-center border-b border-surface-container pb-4">
<span class="font-body-md text-body-md text-on-surface-variant">Date &amp; Time</span>
<span class="font-label-md text-label-md text-on-surface">Oct 26, 2023 • 14:30</span>
</div>
<div class="flex justify-between items-center border-b border-surface-container pb-4">
<span class="font-body-md text-body-md text-on-surface-variant">Transaction ID</span>
<span class="font-label-md text-label-md text-on-surface font-mono">TRX-987654321</span>
</div>
<div class="flex justify-between items-center border-b border-surface-container pb-4">
<span class="font-body-md text-body-md text-on-surface-variant">Recipient</span>
<span class="font-label-md text-label-md text-on-surface">Kwame's Plumbing Solutions</span>
</div>
<div class="flex justify-between items-center pb-2">
<span class="font-body-md text-body-md text-on-surface-variant">Service Type</span>
<span class="font-label-md text-label-md text-on-surface">Pipe Repair &amp; Assessment</span>
</div>
</div>
</article>

<button class="w-full h-touch-target bg-primary-container text-on-primary-container font-label-md text-label-md rounded-lg flex justify-center items-center gap-2 hover:bg-primary-fixed-dim active:scale-95 transition-all duration-200 shadow-sm font-bold">

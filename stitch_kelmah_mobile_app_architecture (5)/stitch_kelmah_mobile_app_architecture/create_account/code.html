<!DOCTYPE html>

<html class="light" lang="en"><head>

<title>Kelmah - Sign Up</title>

                        "tertiary": "#5f5f57",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg border border-surface-variant overflow-hidden">
<!-- Header -->
<div class="p-gutter md:p-margin-mobile border-b border-surface-variant text-center bg-surface-bright">
<h1 class="font-display-lg text-display-lg text-primary">Kelmah</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Create your account to get started.</p>
</div>
<form class="p-gutter md:p-margin-mobile space-y-6">
<!-- Role Selection -->
<div>
<span class="block font-label-md text-label-md text-on-surface mb-3">I am a...</span>
<div class="grid grid-cols-2 gap-4">
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="role" type="radio" value="artisan"/>
<div class="flex flex-col items-center justify-center p-4 rounded-lg border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container/10 transition-all">
<span class="material-symbols-outlined text-3xl mb-2 text-on-surface-variant peer-checked:text-primary">construction</span>
<span class="font-label-md text-label-md text-on-surface">Artisan / Worker</span>
</div>
</label>
<label class="cursor-pointer relative">
<input class="peer sr-only" name="role" type="radio" value="hirer"/>
<div class="flex flex-col items-center justify-center p-4 rounded-lg border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary-container/10 transition-all">
<span class="material-symbols-outlined text-3xl mb-2 text-on-surface-variant peer-checked:text-primary">person_search</span>
<span class="font-label-md text-label-md text-on-surface">Hirer</span>
</div>
</label>
</div>
</div>
<!-- Input Fields -->
<div class="space-y-4">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="fullName">Full Name</label>
<input class="w-full h-touch-target px-4 bg-surface rounded-DEFAULT border border-outline-variant focus:border-on-background focus:ring-1 focus:ring-primary-container transition-shadow font-body-md text-body-md outline-none" id="fullName" required="" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="email">Email Address</label>
<input class="w-full h-touch-target px-4 bg-surface rounded-DEFAULT border border-outline-variant focus:border-on-background focus:ring-1 focus:ring-primary-container transition-shadow font-body-md text-body-md outline-none" id="email" required="" type="email"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="phone">Phone Number</label>
<input class="w-full h-touch-target px-4 bg-surface rounded-DEFAULT border border-outline-variant focus:border-on-background focus:ring-1 focus:ring-primary-container transition-shadow font-body-md text-body-md outline-none" id="phone" required="" type="tel"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="password">Password</label>
<div class="relative">
<input class="w-full h-touch-target px-4 pr-12 bg-surface rounded-DEFAULT border border-outline-variant focus:border-on-background focus:ring-1 focus:ring-primary-container transition-shadow font-body-md text-body-md outline-none" id="password" required="" type="password"/>
<button class="absolute right-0 top-0 h-full px-3 flex items-center text-on-surface-variant hover:text-on-surface" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="visibilityIcon">visibility</span>
</button>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-touch-target bg-primary-container text-[#1A1A1A] font-label-md text-label-md font-bold rounded-DEFAULT hover:bg-inverse-primary transition-colors active:scale-95 flex items-center justify-center gap-2" type="submit">
<span>Sign Up</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-surface-variant"></div>
<span class="flex-shrink-0 mx-4 font-caption text-caption text-on-surface-variant">or continue with</span>
<div class="flex-grow border-t border-surface-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="h-touch-target flex items-center justify-center gap-2 border border-on-background rounded-DEFAULT bg-transparent hover:bg-surface-container-low transition-colors text-on-background font-label-md text-label-md" type="button">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPbfQ2ENBQurq2mNNjvHPbF7c07miYpF-K0nMts_EzXkrwV1-72ipaXqK_5ETnfl8htncG9934sFUc6cbhU0jcCVYlgPanwroUbIJyTVquf-vXSvbTqRos5pkUdP_0qIW8kIAMhpnQCrzas1RqNR2bSrbMS-mP-kQAUx11isaHoRFBVGB4kZHH_zm0Bx9rub-tAgy_sqRknGzdA_UfaGafAsGg_WEN1a6EVKLcWGYOn_UK_l-_G3L5cXNYhtRna0ZSTwJwMQC9APE"/>
                    Google
                </button>
<button class="h-touch-target flex items-center justify-center gap-2 border border-on-background rounded-DEFAULT bg-transparent hover:bg-surface-container-low transition-colors text-on-background font-label-md text-label-md" type="button">
<img alt="Apple" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD8dk4ULQJ4YvSKxFflAcazBogp0yl8c1afvjwHxZAhhFngvEUIg1pJ4L9cE2kDuoPIsgLMhKyzOuSmVsR1S0rEhXd3b5WHjy2CYklAiNvk9VdMnYxn7hAanQ5pGZLgjzZ-ijj9rzYt-4_GB1CLHSixl0pteWKH5PfrBIKlfmHl6K5TsKPy77rZEBqXWAgEXIrG5ErNWohVMcsAJn1SoXy-cGhU9HiJapv-b5Lt4NgGa5GzE2QayjvdEiqqFMFbAqdXSggUBZC3jeM"/>
                    Apple
                </button>
</div>
<!-- Login Link -->
<p class="text-center font-body-md text-body-md text-on-surface-variant">
                Already have an account? <a class="text-primary font-semibold hover:underline" href="#">Log In</a>
</p>
</form>
</div>
<script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('visibilityIcon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                pwdInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body></html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar suppressed as per "Destination Rule" for linear/transactional intent -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Ambient Decorative Background -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] bg-primary-container/10 rounded-full blur-[100px]"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[40%] h-[40%] bg-surface-dim/30 rounded-full blur-[80px]"></div>
</div>
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-sm border border-surface-variant p-6 md:p-8 relative z-10 flex flex-col gap-8">
<!-- Header Section -->
<div class="flex flex-col gap-2">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Reset Password</h1>
<p class="font-body-md text-body-md text-secondary">Please enter your new password below. Ensure it meets the security requirements.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault(); alert('Password updated successfully.');">
<!-- New Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="new_password">New Password</label>
<div class="relative">
<input class="w-full h-touch-target px-4 py-3 bg-surface border border-on-surface rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-secondary-fixed-dim" id="new_password" oninput="checkStrength()" placeholder="Enter new password" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-on-surface transition-colors" onclick="togglePasswordVisibility('new_password', 'visibility_icon_new')" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="visibility_icon_new">visibility</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="flex flex-col gap-1 mt-2">
<div class="flex gap-1 h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full w-1/4 bg-surface-variant transition-colors duration-300" id="strength_bar_1"></div>
<div class="h-full w-1/4 bg-surface-variant transition-colors duration-300" id="strength_bar_2"></div>
<div class="h-full w-1/4 bg-surface-variant transition-colors duration-300" id="strength_bar_3"></div>
<div class="h-full w-1/4 bg-surface-variant transition-colors duration-300" id="strength_bar_4"></div>
</div>
<span class="font-caption text-caption text-secondary text-right" id="strength_text">Weak</span>
</div>
<!-- Security Requirements -->
<ul class="flex flex-col gap-1 mt-2">
<li class="flex items-center gap-2 font-caption text-caption text-secondary" id="req_length">
<span class="material-symbols-outlined text-[16px]">close</span> At least 8 characters
                        </li>
<li class="flex items-center gap-2 font-caption text-caption text-secondary" id="req_number">
<span class="material-symbols-outlined text-[16px]">close</span> Contains a number
                        </li>
<li class="flex items-center gap-2 font-caption text-caption text-secondary" id="req_symbol">
<span class="material-symbols-outlined text-[16px]">close</span> Contains a special symbol
                        </li>
</ul>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label-md text-label-md text-on-surface" for="confirm_password">Confirm New Password</label>
<div class="relative">
<input class="w-full h-touch-target px-4 py-3 bg-surface border border-on-surface rounded-lg font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors placeholder:text-secondary-fixed-dim" id="confirm_password" placeholder="Confirm new password" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-on-surface transition-colors" onclick="togglePasswordVisibility('confirm_password', 'visibility_icon_confirm')" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="visibility_icon_confirm">visibility</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-touch-target bg-primary-container text-[#1A1A1A] font-headline-md text-headline-md rounded-lg flex items-center justify-center gap-2 mt-4 hover:bg-primary-fixed transition-colors active:scale-95 duration-150" type="submit">
                    Update Password
                </button>
</form>
<div class="text-center">
<a class="font-label-md text-label-md text-secondary hover:text-on-surface transition-colors" href="#">Return to Login</a>
</div>
</div>
</main>
<!-- BottomNavBar suppressed as per "Destination Rule" for linear/transactional intent -->
<script>
        function togglePasswordVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
            } else {
                input.type = "password";
                icon.textContent = "visibility";
            }
        }

        function checkStrength() {
            const pwd = document.getElementById('new_password').value;
            const lengthReq = document.getElementById('req_length');
            const numberReq = document.getElementById('req_number');
            const symbolReq = document.getElementById('req_symbol');
            
            const b1 = document.getElementById('strength_bar_1');
            const b2 = document.getElementById('strength_bar_2');
            const b3 = document.getElementById('strength_bar_3');
            const b4 = document.getElementById('strength_bar_4');
            const stext = document.getElementById('strength_text');

            let score = 0;

            // Check Length
            if (pwd.length >= 8) {
                score++;
                updateReqUI(lengthReq, true);
            } else {
                updateReqUI(lengthReq, false);
            }

            // Check Number
            if (/\d/.test(pwd)) {
                score++;
                updateReqUI(numberReq, true);
            } else {
                updateReqUI(numberReq, false);
            }

            // Check Symbol
            if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]+/.test(pwd)) {
                score++;
                updateReqUI(symbolReq, true);
            } else {
                updateReqUI(symbolReq, false);
            }
            
            // Check Uppercase (bonus for strength bar)
            if (/[A-Z]/.test(pwd)) {
                score++;
            }

            // Reset Bars
            [b1, b2, b3, b4].forEach(b => b.className = 'h-full w-1/4 bg-surface-variant transition-colors duration-300');

            if (pwd.length === 0) {
                stext.textContent = "Weak";
                stext.className = "font-caption text-caption text-secondary text-right";
                return;
            }

            if (score === 1) {
                b1.className = 'h-full w-1/4 bg-error transition-colors duration-300';
                stext.textContent = "Weak";
                stext.className = "font-caption text-caption text-error text-right";
            } else if (score === 2) {
                b1.className = 'h-full w-1/4 bg-status-info transition-colors duration-300';
                b2.className = 'h-full w-1/4 bg-status-info transition-colors duration-300';
                stext.textContent = "Fair";
                stext.className = "font-caption text-caption text-status-info text-right";
            } else if (score === 3) {
                b1.className = 'h-full w-1/4 bg-primary-container transition-colors duration-300';
                b2.className = 'h-full w-1/4 bg-primary-container transition-colors duration-300';
                b3.className = 'h-full w-1/4 bg-primary-container transition-colors duration-300';
                stext.textContent = "Good";
                stext.className = "font-caption text-caption text-primary text-right";
            } else if (score >= 4) {
                b1.className = 'h-full w-1/4 bg-status-success transition-colors duration-300';
                b2.className = 'h-full w-1/4 bg-status-success transition-colors duration-300';
                b3.className = 'h-full w-1/4 bg-status-success transition-colors duration-300';
                b4.className = 'h-full w-1/4 bg-status-success transition-colors duration-300';
                stext.textContent = "Strong";
                stext.className = "font-caption text-caption text-status-success text-right";
            }
        }

        function updateReqUI(el, isMet) {
            const icon = el.querySelector('span');
            if (isMet) {
                icon.textContent = "check";
                el.classList.remove('text-secondary');
                el.classList.add('text-status-success');
            } else {
                icon.textContent = "close";
                el.classList.remove('text-status-success');
                el.classList.add('text-secondary');
            }
        }
    </script>
</body></html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kelmah - Assessment Question</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Montserrat:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#f9f9f9",
                        "error": "#ba1a1a",
                        "on-primary-fixed-variant": "#544600",
                        "primary-fixed-dim": "#e9c400",
                        "inverse-primary": "#e9c400",
                        "inverse-surface": "#2f3131",
                        "outline-variant": "#d0c6ab",
                        "tertiary-fixed-dim": "#c8c7bd",
                        "on-surface": "#1a1c1c",
                        "tertiary-container": "#dcdad0",
                        "on-tertiary-fixed-variant": "#474740",
                        "inverse-on-surface": "#f0f1f1",
                        "on-error": "#ffffff",
                        "primary": "#705d00",
                        "surface-muted": "#F3F4F6",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface-container-highest": "#e2e2e2",
                        "on-background": "#1a1c1c",
                        "on-secondary-container": "#636262",
                        "surface-bright": "#f9f9f9",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#705e00",
                        "outline": "#7e775f",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f3f3f4",
                        "on-secondary-fixed": "#1c1b1b",
                        "primary-container": "#ffd700",
                        "surface-container-high": "#e8e8e8",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#1b1c16",
                        "surface": "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "status-info": "#3B82F6",
                        "secondary": "#5f5e5e",
                        "on-secondary-fixed-variant": "#474746",
                        "status-success": "#10B981",
                        "on-surface-variant": "#4d4732",
                        "surface-variant": "#e2e2e2",
                        "text-body": "#4B5563",
                        "tertiary-fixed": "#e4e3d9",
                        "secondary-fixed": "#e5e2e1",
                        "secondary-container": "#e2dfde",
                        "on-tertiary-container": "#5f5f58",
                        "on-primary-fixed": "#221b00",
                        "on-primary": "#ffffff",
                        "surface-tint": "#705d00",
                        "surface-dim": "#dadada",
                        "primary-fixed": "#ffe16d",
                        "tertiary": "#5f5f57"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "margin-desktop": "64px",
                        "touch-target": "48px",
                        "margin-mobile": "16px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Montserrat"],
                        "caption": ["Inter"],
                        "headline-lg": ["Montserrat"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Montserrat"],
                        "headline-md": ["Montserrat"],
                        "label-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "700" }],
                        "caption": ["12px", { "lineHeight": "16px", "fontWeight": "500" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .custom-radio:checked + label {
            border-color: #705d00;
            background-color: #ffd700;
            color: #1a1c1c;
        }
        .custom-radio:checked + label .radio-inner {
            background-color: #1a1c1c;
            transform: scale(1);
        }
        .custom-radio + label .radio-inner {
            transform: scale(0);
            transition: transform 0.2s ease-in-out;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased md:hidden">
<!-- TopAppBar Header Component (Transactional Intent - Suppressed global nav, Custom back button) -->
<header class="bg-surface dark:bg-surface-dim w-full top-0 sticky flex items-center justify-between px-margin-mobile h-touch-target z-50">
<button aria-label="Exit Assessment" class="text-on-surface-variant flex items-center justify-center h-touch-target w-touch-target active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined">close</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Assessment</div>
<div class="w-touch-target h-touch-target flex items-center justify-center">
<!-- Timer Icon/Display -->
<div class="flex items-center text-status-error font-label-md text-label-md font-bold">
<span class="material-symbols-outlined text-error mr-1" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="text-error">12:45</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-margin-mobile pt-4 pb-24">
<!-- Progress Indicator -->
<div class="mb-6">
<div class="flex justify-between items-center mb-2">
<span class="font-label-md text-label-md text-on-surface-variant">Question 4 of 20</span>
<span class="font-label-md text-label-md text-on-surface-variant">20% Completed</span>
</div>
<div class="w-full bg-surface-container h-2 rounded-full overflow-hidden">
<div class="bg-primary h-full rounded-full transition-all duration-300 ease-in-out" style="width: 20%;"></div>
</div>
</div>
<!-- Question Container -->
<div class="bg-surface-container-lowest rounded-xl border border-outline-variant p-6 shadow-[0px_4px_20px_rgba(0,0,0,0.04)] mb-auto">
<!-- Trade Context Badge -->
<div class="inline-flex items-center bg-surface-container text-on-surface-variant font-caption text-caption px-3 py-1 rounded-full mb-4">
<span class="material-symbols-outlined text-[14px] mr-1">plumbing</span>
                Residential Plumbing
            </div>
<!-- Question Text -->
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-6">
                When installing a P-trap under a standard kitchen sink, what is the primary purpose of the water seal?
            </h2>
<!-- Options -->
<div class="space-y-3">
<div class="relative">
<input class="custom-radio sr-only" id="option_a" name="plumbing_question" type="radio"/>
<label class="flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors duration-200" for="option_a">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant mr-3 flex items-center justify-center shrink-0">
<div class="w-2.5 h-2.5 rounded-full radio-inner bg-on-surface"></div>
</div>
<span class="font-body-md text-body-md">To slow down the drainage of water to prevent pipe erosion.</span>
</label>
</div>
<div class="relative">
<input class="custom-radio sr-only" id="option_b" name="plumbing_question" type="radio"/>
<label class="flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors duration-200" for="option_b">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant mr-3 flex items-center justify-center shrink-0">
<div class="w-2.5 h-2.5 rounded-full radio-inner bg-on-surface"></div>
</div>
<span class="font-body-md text-body-md">To catch debris and prevent clogs deep in the main sewer line.</span>
</label>
</div>
<div class="relative">
<input checked="" class="custom-radio sr-only" id="option_c" name="plumbing_question" type="radio"/>
<label class="flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors duration-200" for="option_c">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant mr-3 flex items-center justify-center shrink-0">
<div class="w-2.5 h-2.5 rounded-full radio-inner bg-on-surface"></div>
</div>
<span class="font-body-md text-body-md">To prevent sewer gases from entering the building through the drain.</span>
</label>
</div>
<div class="relative">
<input class="custom-radio sr-only" id="option_d" name="plumbing_question" type="radio"/>
<label class="flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors duration-200" for="option_d">
<div class="w-5 h-5 rounded-full border-2 border-outline-variant mr-3 flex items-center justify-center shrink-0">
<div class="w-2.5 h-2.5 rounded-full radio-inner bg-on-surface"></div>
</div>
<span class="font-body-md text-body-md">To increase the water pressure in the adjacent supply lines.</span>
</label>
</div>
</div>
</div>
</main>
<!-- Bottom Actions (Fixed) -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant p-margin-mobile flex justify-between items-center z-40 pb-safe">
<button class="flex items-center justify-center px-4 h-touch-target rounded-lg font-label-md text-label-md text-on-surface border border-on-surface hover:bg-surface-container active:scale-95 transition-all">
<span class="material-symbols-outlined mr-2">arrow_back</span>
            Previous
        </button>
<button class="flex items-center justify-center px-6 h-touch-target rounded-lg font-label-md text-label-md text-on-primary bg-primary hover:bg-surface-tint active:scale-95 transition-all shadow-md">
            Next
            <span class="material-symbols-outlined ml-2">arrow_forward</span>
</button>
</div>
</body></html>

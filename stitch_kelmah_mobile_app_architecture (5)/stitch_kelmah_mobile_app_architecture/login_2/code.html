<body class="bg-background text-on-background min-h-screen flex flex-col antialiased">
<!-- Suppressed TopAppBar & BottomNavBar as per Semantic Shell Mandate for Linear/Transactional screens (Login) -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Abstract Background Accent (Industrial Theme) -->
<div class="absolute inset-0 pointer-events-none z-0 overflow-hidden flex justify-center items-center opacity-10">
<svg aria-hidden="true" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[150%] h-[150%] max-w-none text-on-surface" viewbox="0 0 1024 1024">
<defs>
<pattern height="64" id="grid-pattern" patternunits="userSpaceOnUse" width="64">
<path d="M 64 0 L 0 0 0 64" fill="none" stroke="currentColor" stroke-dasharray="4 4" stroke-width="1"></path>
</pattern>
</defs>
<rect fill="url(#grid-pattern)" height="100%" width="100%"></rect>
</svg>
</div>
<div class="w-full max-w-md z-10">
<!-- Header Area -->
<div class="text-center mb-10 flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded-lg flex items-center justify-center shadow-sm mb-4">
<span class="material-symbols-outlined text-4xl text-on-primary-container" style="font-variation-settings: 'FILL' 1;">construction</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-background">Kelmah</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Professional Trades, Trusted Connections.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-8 relative overflow-hidden">
<!-- Subtle Top Border Accent -->
<div class="absolute top-0 left-0 right-0 h-1 bg-primary-container"></div>
<h2 class="font-headline-md text-headline-md mb-6">Welcome Back</h2>
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 font-body-md text-body-md border border-on-background bg-surface-container-lowest text-on-surface rounded-DEFAULT focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-shadow outline-none min-h-[48px]" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant">lock</span>
</div>
<input class="block w-full pl-10 pr-12 py-3 font-body-md text-body-md border border-on-background bg-surface-container-lowest text-on-surface rounded-DEFAULT focus:ring-2 focus:ring-primary-container focus:border-primary-container transition-shadow outline-none min-h-[48px]" id="password" name="password" placeholder="Enter your password" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-on-surface-variant hover:text-on-surface focus:outline-none min-w-[48px] justify-end" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="toggleIcon">visibility</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-DEFAULT font-headline-md text-label-md bg-primary-container text-[#1A1A1A] hover:bg-primary-fixed shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container active:scale-95 transition-all duration-200 min-h-[48px] items-center" type="submit">
                            Log In
                        </button>
</div>
</form>
<!-- Divider -->
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-surface-container-lowest font-body-md text-caption text-on-surface-variant">Or continue with</span>
</div>
</div>
<!-- Social Logins -->
<div class="mt-6 grid grid-cols-2 gap-3">
<button class="w-full flex justify-center items-center py-2 px-4 border border-on-background rounded-DEFAULT bg-transparent text-on-surface hover:bg-surface-container-low focus:outline-none min-h-[48px] transition-colors" type="button">
<!-- Generic SVG for Google placeholder -->
<svg class="h-5 w-5 mr-2" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-md text-label-md">Google</span>
</button>
<button class="w-full flex justify-center items-center py-2 px-4 border border-on-background rounded-DEFAULT bg-transparent text-on-surface hover:bg-surface-container-low focus:outline-none min-h-[48px] transition-colors" type="button">
<span class="material-symbols-outlined mr-2">ios</span>
<span class="font-label-md text-label-md">Apple</span>
</button>
</div>
</div>
</div>
<!-- Create Account Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-label-md text-label-md text-on-background underline hover:text-primary transition-colors" href="#">Create Account</a>
</p>
</div>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');

            togglePassword.addEventListener('click', function (e) {
                // toggle the type attribute
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // toggle the eye icon
                toggleIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
            });
        });
    </script>
</body></html>

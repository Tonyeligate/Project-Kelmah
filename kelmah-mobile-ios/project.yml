name: Kelmah
options:
  bundleIdPrefix: com.kelmah
configs:
  Debug: debug
  Release: release
targets:
  Kelmah:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Kelmah
        excludes:
          - "**/*.md"
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kelmah.mobile
        INFOPLIST_FILE: Kelmah/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_VERSION: 5.10
        TARGETED_DEVICE_FAMILY: "1,2"
    scheme:
      testTargets:
        - KelmahTests
        - KelmahUITests
  KelmahTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KelmahTests
    dependencies:
      - target: Kelmah
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kelmah.mobile.tests
        SWIFT_VERSION: 5.10
  KelmahUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KelmahUITests
    dependencies:
      - target: Kelmah
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kelmah.mobile.uitests
        SWIFT_VERSION: 5.10

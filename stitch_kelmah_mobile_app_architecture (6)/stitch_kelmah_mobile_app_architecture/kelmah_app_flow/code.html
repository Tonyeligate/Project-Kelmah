<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .splash-enter {
            animation: fadeUpScale 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .loading-line {
            animation: progressLine 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes fadeUpScale {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes progressLine {
            0% {
                transform: translateX(-100%);
            }
            50% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(100%);
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-primary-container min-h-screen w-full flex items-center justify-center overflow-hidden relative">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.1)_0%,transparent_100%)] pointer-events-none"></div>
<main class="flex flex-col items-center justify-center z-10 splash-enter">
<div class="mb-6 flex items-center justify-center">
<h1 class="font-display-lg text-display-lg text-on-primary-container tracking-tight">Kelmah</h1>
</div>
<div class="w-32 h-1 bg-on-primary-container/20 rounded-full overflow-hidden mt-8">
<div class="w-full h-full bg-on-primary-container rounded-full loading-line"></div>
</div>
<p class="mt-6 font-caption text-caption text-on-primary-container/70 uppercase tracking-widest">
            Professional &amp; Reliable
        </p>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const main = document.querySelector('main');
                main.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                main.style.opacity = '0';
                main.style.transform = 'translateY(-10px)';
            }, 3000);
        });
    </script>

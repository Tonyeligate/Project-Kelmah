<div class="w-full max-w-md w-full flex flex-col gap-6 relative">
<button aria-label="Go back to login" class="flex items-center gap-2 text-on-surface-variant hover:text-on-background transition-colors w-fit h-touch-target pr-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-container">
<span aria-hidden="true" class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-label-md text-label-md">Back to Login</span>
</button>
<main class="bg-surface p-6 md:p-8 rounded-xl border border-surface-container-high shadow-sm flex flex-col gap-8 w-full">
<header class="flex flex-col items-center text-center gap-4">
<div class="w-16 h-16 rounded-full bg-surface-container flex items-center justify-center text-on-background shadow-sm">
<span class="material-symbols-outlined !text-[32px]" data-icon="shield_lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
</div>
<div class="flex flex-col gap-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background">Security Check</h1>
<p class="font-body-md text-body-md text-text-body max-w-[280px] mx-auto">
                        To maintain site security, please enter the 6-digit code sent to your registered device.
                    </p>
</div>
</header>
<form class="flex flex-col gap-8" id="mfa-form">
<div class="flex justify-between gap-2 sm:gap-3" id="otp-container">
<input aria-label="Digit 1" class="mfa-input w-full h-14 sm:h-16 text-center font-headline-md text-headline-md text-on-background bg-surface-container-lowest border border-outline rounded-lg focus:border-on-background focus:ring-2 focus:ring-primary-container outline-none transition-all" maxlength="1" type="number"/>
<input aria-label="Digit 2" class="mfa-input w-full h-14 sm:h-16 text-center font-headline-md text-headline-md text-on-background bg-surface-container-lowest border border-outline rounded-lg focus:border-on-background focus:ring-2 focus:ring-primary-container outline-none transition-all" disabled="" maxlength="1" type="number"/>
<input aria-label="Digit 3" class="mfa-input w-full h-14 sm:h-16 text-center font-headline-md text-headline-md text-on-background bg-surface-container-lowest border border-outline rounded-lg focus:border-on-background focus:ring-2 focus:ring-primary-container outline-none transition-all" disabled="" maxlength="1" type="number"/>
<input aria-label="Digit 4" class="mfa-input w-full h-14 sm:h-16 text-center font-headline-md text-headline-md text-on-background bg-surface-container-lowest border border-outline rounded-lg focus:border-on-background focus:ring-2 focus:ring-primary-container outline-none transition-all" disabled="" maxlength="1" type="number"/>
<input aria-label="Digit 5" class="mfa-input w-full h-14 sm:h-16 text-center font-headline-md text-headline-md text-on-background bg-surface-container-lowest border border-outline rounded-lg focus:border-on-background focus:ring-2 focus:ring-primary-container outline-none transition-all" disabled="" maxlength="1" type="number"/>
<input aria-label="Digit 6" class="mfa-input w-full h-14 sm:h-16 text-center font-headline-md text-headline-md text-on-background bg-surface-container-lowest border border-outline rounded-lg focus:border-on-background focus:ring-2 focus:ring-primary-container outline-none transition-all" disabled="" maxlength="1" type="number"/>
</div>
<div class="flex flex-col gap-4">
<button class="w-full h-touch-target bg-primary-container text-on-background font-label-md text-label-md uppercase tracking-wider rounded-lg flex items-center justify-center hover:bg-primary-fixed transition-colors active:scale-95 shadow-sm border border-transparent focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-on-background" type="button">
                        Verify Account
                    </button>
<div class="flex justify-center items-center gap-1 font-label-md text-label-md">
<span class="text-text-body">Didn't receive code?</span>
<button class="text-on-background hover:text-primary-container transition-colors focus:outline-none focus:underline px-2 py-1 rounded-sm" id="resend-btn" type="button">
                            Resend Code <span class="text-on-surface-variant font-normal" id="timer">(0:59)</span>
</button>
</div>

</form>
</main>
<footer class="text-center mt-4 opacity-70 flex items-center justify-center gap-2">
<span aria-hidden="true" class="material-symbols-outlined !text-[16px]" data-icon="lock">lock</span>
<span class="font-caption text-caption text-text-body">Secured by Kelmah Enterprise Authentication</span>
</footer>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.mfa-input');
            const form = document.getElementById('mfa-form');

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    const val = e.target.value;
                    
                    if (val.length > 1) {
                        e.target.value = val.slice(0, 1);
                    }
                    
                    if (val.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].disabled = false;
                        inputs[index + 1].focus();
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        inputs[index - 1].focus();
                        inputs[index].disabled = true;
                    }
                });
                
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').slice(0, inputs.length).replace(/[^0-9]/g, '');
                    if(pastedData) {
                        for(let i = 0; i < pastedData.length; i++) {
                            if(inputs[i]) {
                                inputs[i].disabled = false;
                                inputs[i].value = pastedData[i];
                            }
                        }
                        const focusIndex = Math.min(pastedData.length, inputs.length - 1);
                        inputs[focusIndex].disabled = false;
                        inputs[focusIndex].focus();
                    }
                });
            });

            const resendBtn = document.getElementById('resend-btn');
            const timerSpan = document.getElementById('timer');
            let timeLeft = 59;
            let timerId;

            function startTimer() {
                resendBtn.disabled = true;
                resendBtn.classList.add('opacity-50', 'cursor-not-allowed');
                
                timerId = setInterval(() => {
                    timeLeft--;
                    timerSpan.textContent = `(0:${timeLeft < 10 ? '0' : ''}${timeLeft})`;
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        resendBtn.disabled = false;
                        resendBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        timerSpan.textContent = '';
                        timeLeft = 59;
                    }
                }, 1000);
            }
            
            startTimer();

            resendBtn.addEventListener('click', () => {
                if(!resendBtn.disabled) {
                    startTimer();
                }
            });
        });
    </script>

<body class="bg-background text-on-background min-h-screen pb-[100px] md:pb-0 font-body-md">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface border-b border-outline-variant w-full top-0 sticky flex justify-between items-center px-gutter h-touch-target z-50">
<button aria-label="Go back" class="h-touch-target w-touch-target flex items-center justify-center text-on-surface-variant dark:text-surface-variant transition-colors duration-200 active:opacity-70 hover:bg-surface-container dark:hover:bg-surface-variant rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary dark:text-primary-fixed">Deposit Funds</h1>
<div class="w-touch-target"></div> <!-- Spacer for centering -->
</header>
<main class="max-w-[1280px] mx-auto px-margin-mobile md:px-margin-desktop py-8 grid grid-cols-1 md:grid-cols-12 gap-8">
<!-- Main Form Area -->
<div class="col-span-1 md:col-span-8 lg:col-span-6 md:col-start-3 lg:col-start-4">
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-6 shadow-[0_4px_20px_rgba(0,0,0,0.04)] mb-8">
<!-- Amount Input -->
<div class="mb-8">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="deposit-amount">Amount to Deposit (GHS)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-headline-md text-headline-md text-on-surface-variant">₵</span>
<input class="w-full pl-12 pr-4 h-touch-target rounded-lg border border-[#1A1A1A] bg-surface-container-lowest font-headline-md text-headline-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="deposit-amount" min="1" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Provider Selection -->
<div class="mb-8">
<h2 class="font-label-md text-label-md text-on-surface mb-4">Select Mobile Money Provider</h2>
<div class="grid grid-cols-1 gap-4">
<label class="relative flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors has-[:checked]:border-primary-container has-[:checked]:bg-surface-container-low">
<input checked="" class="peer sr-only" name="provider" type="radio" value="mtn"/>
<div class="w-12 h-12 rounded bg-[#FFCC00] flex items-center justify-center mr-4 shrink-0 overflow-hidden" data-alt="A minimal corporate style graphic featuring a bright yellow background with subtle black typographic elements, representing MTN Mobile Money in a clean, modern UI context.">
<span class="font-headline-md text-headline-md text-[#000000] font-bold">M</span>
</div>
<div class="flex-grow">
<span class="block font-body-md text-body-md font-semibold text-on-surface">MTN Mobile Money</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary-container peer-checked:bg-primary-container flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-[16px] text-on-primary-container opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
</div>
</label>
<label class="relative flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors has-[:checked]:border-primary-container has-[:checked]:bg-surface-container-low">
<input class="peer sr-only" name="provider" type="radio" value="vodafone"/>
<div class="w-12 h-12 rounded bg-[#E60000] flex items-center justify-center mr-4 shrink-0 overflow-hidden" data-alt="A minimal corporate style graphic featuring a stark red background with white typographic elements, representing Vodafone Cash in a clean, modern UI context.">
<span class="font-headline-md text-headline-md text-white font-bold">V</span>
</div>
<div class="flex-grow">
<span class="block font-body-md text-body-md font-semibold text-on-surface">Vodafone Cash</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary-container peer-checked:bg-primary-container flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-[16px] text-on-primary-container opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
</div>
</label>
<label class="relative flex items-center p-4 border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors has-[:checked]:border-primary-container has-[:checked]:bg-surface-container-low">
<input class="peer sr-only" name="provider" type="radio" value="airteltigo"/>
<div class="w-12 h-12 rounded bg-[#00529C] flex items-center justify-center mr-4 shrink-0 overflow-hidden" data-alt="A minimal corporate style graphic featuring a deep blue and vibrant red split background with white typographic elements, representing AirtelTigo in a clean, modern UI context.">
<span class="font-headline-md text-headline-md text-white font-bold">AT</span>
</div>
<div class="flex-grow">
<span class="block font-body-md text-body-md font-semibold text-on-surface">AirtelTigo Money</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary-container peer-checked:bg-primary-container flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-[16px] text-on-primary-container opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check">check</span>
</div>
</label>
</div>
</div>
<!-- Phone Number -->
<div class="mb-8">
<label class="block font-label-md text-label-md text-on-surface mb-2" for="phone-number">Mobile Money Number</label>
<input class="w-full px-4 h-touch-target rounded-lg border border-[#1A1A1A] bg-surface-container-lowest font-body-md text-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all" id="phone-number" placeholder="e.g. 024 XXX XXXX" type="tel"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-touch-target bg-[#FFD700] text-[#1A1A1A] font-headline-md text-headline-md font-bold rounded-lg flex items-center justify-center gap-2 hover:opacity-90 transition-opacity active:scale-[0.98]">
<span>Confirm Deposit</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</main>
</body></html>

<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Job Post - Kelmah</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

                        "inverse-on-surface": "#f0f1f1",

                        "status-info": "#3B82F6",
                        "outline": "#7e775f",
                        "tertiary-fixed-dim": "#c8c7bd",
                        "primary-fixed": "#ffe16d",
                        "secondary-fixed": "#e5e2e1",
                        "secondary": "#5f5e5e",
                        "surface": "#f9f9f9",
                        "surface-dim": "#dadada",
                        "inverse-surface": "#2f3131",
                        "surface-container-highest": "#e2e2e2",
                        "on-secondary-container": "#636262",
                        "on-primary-container": "#705e00",
                        "on-primary-fixed": "#221b00",
                        "on-tertiary-fixed": "#1b1c16",
                        "on-error-container": "#93000a",
                        "primary": "#705d00",
                        "surface-muted": "#F3F4F6",
                        "surface-container-high": "#e8e8e8",
                        "surface-tint": "#705d00",
                        "on-surface": "#1a1c1c",
                        "surface-container-lowest": "#ffffff",
                        "text-body": "#4B5563",
                        "secondary-container": "#e2dfde",
                        "on-primary-fixed-variant": "#544600",
                        "on-error": "#ffffff",
                        "surface-variant": "#e2e2e2",
                        "tertiary": "#5f5f57",
                        "error-container": "#ffdad6",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#1c1b1b",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#c8c6c5",
                        "on-tertiary-fixed-variant": "#474740",
                        "on-background": "#1a1c1c",
                        "tertiary-container": "#dcdad0",
                        "on-tertiary-container": "#5f5f58",
                        "background": "#f9f9f9",
                        "outline-variant": "#d0c6ab",
                        "error": "#ba1a1a",
                        "status-success": "#10B981",
                        "on-secondary-fixed-variant": "#474746",
                        "surface-bright": "#f9f9f9",
                        "primary-fixed-dim": "#e9c400",
                        "on-surface-variant": "#4d4732",
                        "tertiary-fixed": "#e4e3d9"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-desktop": "64px",

                        "gutter": "16px",

                    "fontFamily": {

                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md text-body-md min-h-screen pb-20 md:pb-0">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 w-full z-50 bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop h-touch-target">
<button aria-label="Menu" class="flex items-center justify-center w-12 h-12 text-primary dark:text-inverse-primary hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform duration-200 rounded-full">
<span class="material-symbols-outlined" data-icon="construction">construction</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md font-bold text-primary dark:text-primary-container">Kelmah</h1>
<button aria-label="Notifications" class="flex items-center justify-center w-12 h-12 text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-container-highest transition-colors active:scale-95 transition-transform duration-200 rounded-full">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="pt-24 px-margin-mobile md:px-margin-desktop max-w-3xl mx-auto">
<!-- Header Section -->
<div class="mb-8">
<h2 class="font-headline-lg-mobile md:text-headline-lg text-on-background mb-2">Create Job Post</h2>
<p class="text-secondary font-body-md text-body-md">Provide details so professionals can understand your needs.</p>
</div>
<!-- Progress Indicator -->
<div class="flex items-center gap-2 mb-8">
<div class="h-2 flex-1 bg-primary-container rounded-full transition-colors duration-300" id="progress-1"></div>
<div class="h-2 flex-1 bg-surface-variant rounded-full transition-colors duration-300" id="progress-2"></div>
<span class="ml-2 font-label-md text-label-md text-secondary" id="step-counter">Step 1 of 2</span>
</div>
<!-- Form Container -->
<div class="bg-surface border border-outline-variant rounded-xl p-6 md:p-8 shadow-sm">
<!-- Step 1: Basic Info -->
<section class="space-y-6 block animate-fade-in" id="step-1-content">
<div>
<h3 class="font-headline-md text-headline-md-mobile text-on-background border-b border-outline-variant pb-2 mb-6">Basic Info</h3>
</div>
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="job-title">Job Title</label>
<input class="w-full h-touch-target px-4 bg-surface-container-lowest border border-outline rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all font-body-md text-body-md text-on-surface placeholder:text-secondary-fixed-dim" id="job-title" placeholder="e.g., Kitchen Sink Repair" type="text"/>
</div>
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="trade-category">Trade Category</label>
<div class="relative">
<select class="w-full h-touch-target px-4 bg-surface-container-lowest border border-outline rounded-lg appearance-none focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all font-body-md text-body-md text-on-surface" id="trade-category">
<option disabled="" selected="" value="">Select a category...</option>
<option value="plumbing">Plumbing</option>
<option value="electrical">Electrical</option>
<option value="carpentry">Carpentry</option>
<option value="hvac">HVAC</option>
<option value="general">General Labor</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-secondary">expand_more</span>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="job-description">Job Description</label>
<textarea class="w-full p-4 bg-surface-container-lowest border border-outline rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all font-body-md text-body-md text-on-surface resize-y placeholder:text-secondary-fixed-dim" id="job-description" placeholder="Describe the issue, materials needed, or any specific requirements..." rows="5"></textarea>
</div>
</section>
<!-- Step 2: Budget & Schedule -->
<section class="space-y-6 hidden animate-fade-in" id="step-2-content">
<div>
<h3 class="font-headline-md text-headline-md-mobile text-on-background border-b border-outline-variant pb-2 mb-6">Budget &amp; Schedule</h3>
</div>
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface">Budget Type</label>
<div class="grid grid-cols-2 gap-4">
<label class="relative flex cursor-pointer rounded-lg border border-outline bg-surface-container-lowest p-4 focus-within:ring-2 focus-within:ring-primary-container hover:bg-surface-container-low transition-colors">
<input checked="" class="sr-only" name="budget-type" type="radio" value="fixed"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Fixed Price</span>
<span class="font-caption text-caption text-secondary mt-1">One clear total</span>
</div>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary-container opacity-100 check-icon">check_circle</span>
</label>
<label class="relative flex cursor-pointer rounded-lg border border-outline bg-surface-container-lowest p-4 focus-within:ring-2 focus-within:ring-primary-container hover:bg-surface-container-low transition-colors">
<input class="sr-only" name="budget-type" type="radio" value="hourly"/>
<div class="flex flex-col">
<span class="font-label-md text-label-md text-on-surface">Hourly Rate</span>
<span class="font-caption text-caption text-secondary mt-1">Pay for time spent</span>
</div>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-primary-container opacity-0 check-icon">check_circle</span>
</label>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="budget-amount">Budget Amount (GHS)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-secondary font-body-md">GH₵</span>
<input class="w-full h-touch-target pl-12 pr-4 bg-surface-container-lowest border border-outline rounded-lg focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all font-body-md text-body-md text-on-surface" id="budget-amount" placeholder="0.00" type="number"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface" for="estimated-duration">Estimated Duration</label>
<div class="relative">
<select class="w-full h-touch-target px-4 bg-surface-container-lowest border border-outline rounded-lg appearance-none focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all font-body-md text-body-md text-on-surface" id="estimated-duration">
<option disabled="" selected="" value="">Select duration...</option>
<option value="1-3-hours">1 - 3 Hours</option>
<option value="half-day">Half Day</option>
<option value="full-day">Full Day</option>
<option value="multiple-days">Multiple Days</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-secondary">expand_more</span>
</div>
</div>
</section>
</div>
<!-- Actions -->
<div class="mt-8 flex items-center justify-between border-t border-outline-variant pt-6 pb-12 md:pb-6">
<button class="h-touch-target px-6 rounded-lg border border-outline text-on-surface font-label-md text-label-md hover:bg-surface-container-high transition-colors active:scale-95 flex items-center justify-center" id="btn-cancel">
                Cancel
            </button>
<div class="flex gap-4">
<button class="hidden h-touch-target px-6 rounded-lg border border-outline text-on-surface font-label-md text-label-md hover:bg-surface-container-high transition-colors active:scale-95 flex items-center justify-center" id="btn-back">
                    Back
                </button>
<button class="h-touch-target px-8 rounded-lg bg-primary-container text-on-primary-container font-headline-md text-label-md font-bold hover:bg-primary-fixed-dim transition-colors active:scale-95 flex items-center justify-center shadow-md" id="btn-next">
                    Next Step
                </button>
</div>
</div>
</main>
<style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        /* Radio button styling logic */
        input[type="radio"]:checked + div + .check-icon {
            opacity: 1;
        }
        input[type="radio"]:checked ~ div {
            font-weight: 600;
        }
        label:has(input[type="radio"]:checked) {
            border-color: #ffd700;
            background-color: #f9f9f9;
        }
    </style>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            let currentStep = 1;
            
            const step1Content = document.getElementById('step-1-content');
            const step2Content = document.getElementById('step-2-content');
            const btnNext = document.getElementById('btn-next');
            const btnBack = document.getElementById('btn-back');
            const progress1 = document.getElementById('progress-1');
            const progress2 = document.getElementById('progress-2');
            const stepCounter = document.getElementById('step-counter');

            // Handle radio button visual state (Tailwind :has is not always supported depending on config, adding simple JS fallback)
            const radioLabels = document.querySelectorAll('input[name="budget-type"]');
            radioLabels.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    document.querySelectorAll('input[name="budget-type"]').forEach(r => {
                        const label = r.closest('label');
                        const icon = label.querySelector('.check-icon');
                        if (r.checked) {
                            label.classList.add('border-primary-container', 'bg-surface');
                            label.classList.remove('border-outline', 'bg-surface-container-lowest');
                            icon.classList.remove('opacity-0');
                            icon.classList.add('opacity-100');
                        } else {
                            label.classList.remove('border-primary-container', 'bg-surface');
                            label.classList.add('border-outline', 'bg-surface-container-lowest');
                            icon.classList.add('opacity-0');
                            icon.classList.remove('opacity-100');
                        }
                    });
                });
            });

            btnNext.addEventListener('click', () => {
                if (currentStep === 1) {
                    // Move to Step 2
                    step1Content.classList.add('hidden');
                    step2Content.classList.remove('hidden');
                    
                    btnBack.classList.remove('hidden');
                    btnNext.textContent = 'Post Job';
                    
                    progress2.classList.remove('bg-surface-variant');
                    progress2.classList.add('bg-primary-container');
                    
                    stepCounter.textContent = 'Step 2 of 2';
                    currentStep = 2;
                } else {
                    // Submit Form Logic would go here
                    btnNext.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">sync</span> Posting...';
                    setTimeout(() => {
                        alert('Job Posted Successfully!');
                        window.location.reload();
                    }, 1500);
                }
            });

            btnBack.addEventListener('click', () => {
                if (currentStep === 2) {
                    // Move back to Step 1
                    step2Content.classList.add('hidden');
                    step1Content.classList.remove('hidden');
                    
                    btnBack.classList.add('hidden');
                    btnNext.textContent = 'Next Step';
                    
                    progress2.classList.remove('bg-primary-container');
                    progress2.classList.add('bg-surface-variant');
                    
                    stepCounter.textContent = 'Step 1 of 2';
                    currentStep = 1;
                }
            });
        });
    </script>
</body></html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Kelmah - Support &amp; Feedback</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#ffffff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#e2dfde",
                        "on-secondary-fixed-variant": "#474746",
                        "on-surface": "#1a1c1c",
                        "outline-variant": "#d0c6ab",
                        "primary-fixed": "#ffe16d",
                        "inverse-surface": "#2f3131",
                        "inverse-on-surface": "#f0f1f1",
                        "on-surface-variant": "#4d4732",
                        "surface-dim": "#dadada",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#5f5f58",
                        "primary": "#705d00",
                        "primary-fixed-dim": "#e9c400",
                        "secondary-fixed": "#e5e2e1",
                        "on-background": "#1a1c1c",
                        "on-primary-fixed-variant": "#544600",
                        "background": "#f9f9f9",
                        "outline": "#7e775f",
                        "surface-container-highest": "#e2e2e2",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#c8c7bd",
                        "on-tertiary-fixed": "#1b1c16",
                        "on-secondary-container": "#636262",
                        "surface-container": "#eeeeee",
                        "status-info": "#3B82F6",
                        "on-tertiary-fixed-variant": "#474740",
                        "surface-variant": "#e2e2e2",
                        "secondary": "#5f5e5e",
                        "surface-bright": "#f9f9f9",
                        "tertiary-container": "#dcdad0",
                        "tertiary-fixed": "#e4e3d9",
                        "status-success": "#10B981",
                        "tertiary": "#5f5f57",
                        "secondary-fixed-dim": "#c8c6c5",
                        "surface": "#f9f9f9",
                        "on-primary-fixed": "#221b00",
                        "surface-container-low": "#f3f3f4",
                        "surface-container-high": "#e8e8e8",
                        "on-error-container": "#93000a",
                        "surface-tint": "#705d00",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#1c1b1b",
                        "surface-muted": "#F3F4F6",
                        "text-body": "#4B5563",
                        "primary-container": "#ffd700",
                        "inverse-primary": "#e9c400",
                        "error": "#ba1a1a",
                        "on-primary-container": "#705e00"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "touch-target": "48px",
                        "margin-desktop": "64px",
                        "base": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-lg-mobile": ["Montserrat"],
                        "display-lg": ["Montserrat"],
                        "headline-md": ["Montserrat"],
                        "caption": ["Inter"],
                        "headline-lg": ["Montserrat"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "34px", "fontWeight": "700"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill-icon {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom File Input Styling */
        input[type="file"]::file-selector-button {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<!-- TopAppBar (Transactional/Focus Mode - Hide Bottom Nav) -->
<header class="w-full top-0 sticky bg-surface dark:bg-on-surface shadow-sm z-50">
<div class="flex items-center justify-between px-margin-mobile h-touch-target w-full z-50">
<button aria-label="Go Back" class="h-touch-target w-touch-target flex items-center justify-center text-primary dark:text-primary-fixed hover:bg-surface-variant dark:hover:bg-on-secondary-fixed-variant transition-colors active:opacity-80 transition-all rounded-full">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-on-surface dark:text-surface">Support</h1>
<div class="h-touch-target w-touch-target"></div> <!-- Spacer for centering -->
</div>
<div class="h-[1px] w-full bg-surface-container-low dark:bg-surface-dim"></div>
</header>
<main class="flex-1 w-full max-w-3xl mx-auto px-margin-mobile py-8 pb-32">
<div class="mb-8">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">How can we help?</h2>
<p class="text-body-md font-body-md text-text-body">Tell us what's happening. We're here to ensure your experience on Kelmah is smooth and professional.</p>
</div>
<!-- Estimated Response Time Banner -->
<div class="bg-surface-container-lowest border border-surface-container-high rounded-xl p-4 mb-8 flex items-start gap-4 shadow-[0px_4px_20px_rgba(0,0,0,0.04)]">
<div class="bg-primary-container/20 text-on-primary-container p-2 rounded-full flex items-center justify-center flex-shrink-0">
<span class="material-symbols-outlined fill-icon text-primary">schedule</span>
</div>
<div>
<h3 class="font-label-md text-label-md text-on-surface mb-1">Estimated Response Time</h3>
<p class="text-body-md font-body-md text-text-body">Typical response: <span class="font-bold text-on-surface">2 hours</span> during business hours.</p>
</div>
</div>
<form class="space-y-6" onsubmit="event.preventDefault(); alert('Report submitted successfully.');">
<!-- Category Selector -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-3">Issue Category</label>
<div class="grid grid-cols-2 gap-3">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="category" type="radio" value="technical"/>
<div class="p-4 rounded-xl border border-surface-container-high bg-surface-container-lowest peer-checked:border-on-surface peer-checked:bg-surface-container-low transition-colors flex flex-col items-center gap-2 text-center h-full">
<span class="material-symbols-outlined text-secondary peer-checked:text-on-surface">build</span>
<span class="font-label-md text-label-md text-secondary peer-checked:text-on-surface">Technical Issue</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="billing"/>
<div class="p-4 rounded-xl border border-surface-container-high bg-surface-container-lowest peer-checked:border-on-surface peer-checked:bg-surface-container-low transition-colors flex flex-col items-center gap-2 text-center h-full">
<span class="material-symbols-outlined text-secondary peer-checked:text-on-surface">payments</span>
<span class="font-label-md text-label-md text-secondary peer-checked:text-on-surface">Billing</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="safety"/>
<div class="p-4 rounded-xl border border-surface-container-high bg-surface-container-lowest peer-checked:border-error peer-checked:bg-error-container/20 transition-colors flex flex-col items-center gap-2 text-center h-full">
<span class="material-symbols-outlined text-secondary peer-checked:text-error">security</span>
<span class="font-label-md text-label-md text-secondary peer-checked:text-error">Safety Concern</span>
</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="category" type="radio" value="general"/>
<div class="p-4 rounded-xl border border-surface-container-high bg-surface-container-lowest peer-checked:border-on-surface peer-checked:bg-surface-container-low transition-colors flex flex-col items-center gap-2 text-center h-full">
<span class="material-symbols-outlined text-secondary peer-checked:text-on-surface">help</span>
<span class="font-label-md text-label-md text-secondary peer-checked:text-on-surface">General Inquiry</span>
</div>
</label>
</div>
</div>
<!-- Subject Line -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="subject">Subject</label>
<input class="w-full h-touch-target px-4 bg-surface-container-lowest border border-surface-container-highest rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:border-on-surface focus:ring-1 focus:ring-on-surface placeholder:text-secondary-fixed-dim transition-colors" id="subject" name="subject" placeholder="Brief summary of the issue" required="" type="text"/>
</div>
<!-- Detailed Description -->
<div>
<div class="flex justify-between items-baseline mb-2">
<label class="block font-label-md text-label-md text-on-surface" for="description">Detailed Description</label>
<span class="font-caption text-caption text-secondary" id="charCount">0 / 500</span>
</div>
<textarea class="w-full p-4 bg-surface-container-lowest border border-surface-container-highest rounded-lg text-body-md font-body-md text-on-surface focus:outline-none focus:border-on-surface focus:ring-1 focus:ring-on-surface placeholder:text-secondary-fixed-dim transition-colors resize-none" id="description" maxlength="500" name="description" placeholder="Please provide as much detail as possible. If reporting a bug, include steps to reproduce." required="" rows="5"></textarea>
<script>
                    const textarea = document.getElementById('description');
                    const charCount = document.getElementById('charCount');
                    textarea.addEventListener('input', function() {
                        charCount.textContent = `${this.value.length} / 500`;
                        if(this.value.length >= 450) {
                            charCount.classList.add('text-error');
                            charCount.classList.remove('text-secondary');
                        } else {
                            charCount.classList.remove('text-error');
                            charCount.classList.add('text-secondary');
                        }
                    });
                </script>
</div>
<!-- Image Upload Component -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2">Attachments (Screenshots/Photos)</label>
<div class="border-2 border-dashed border-surface-container-highest rounded-xl p-6 bg-surface-container-lowest text-center hover:bg-surface-container-low transition-colors cursor-pointer relative group" onclick="document.getElementById('file-upload').click()">
<input accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" id="file-upload" multiple="" type="file"/>
<span class="material-symbols-outlined text-4xl text-secondary mb-2 group-hover:text-primary transition-colors">add_photo_alternate</span>
<p class="font-label-md text-label-md text-on-surface mb-1">Tap to upload or drag &amp; drop</p>
<p class="font-caption text-caption text-secondary">JPG, PNG up to 10MB</p>
</div>
<!-- Preview Area (Empty by default, managed by JS usually) -->
<div class="flex gap-2 mt-3 overflow-x-auto pb-2 hidden" id="file-preview-container">
<!-- Placeholder for selected files -->
</div>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full h-touch-target bg-primary-container text-on-primary-container font-label-md text-label-md rounded-lg hover:bg-primary-fixed-dim active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined">send</span>
                    Submit Report
                </button>
</div>
</form>
</main>
<!-- Suppressed BottomNavBar due to Task-Focused/Linear intent -->
</body></html>

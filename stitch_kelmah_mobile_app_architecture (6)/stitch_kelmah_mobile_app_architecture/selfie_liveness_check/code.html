<script>
        // Simple mock sequence for the liveness check prompts
        const instructions = [
            { text: "Please blink slowly.", icon: "face" },
            { text: "Turn your head slightly to the left.", icon: "turn_left" },
            { text: "Turn your head slightly to the right.", icon: "turn_right" },
            { text: "Smile broadly.", icon: "sentiment_very_satisfied" },
            { text: "Verification Complete.", icon: "check_circle", status: "Success", color: "text-status-success" }
        ];

        let currentIndex = 0;
        const instructionText = document.getElementById('instruction-text');
        const instructionStatus = document.getElementById('instruction-status');
        const iconSpan = document.querySelector('[data-icon]');

        function updateInstruction() {
            if (currentIndex < instructions.length) {
                const current = instructions[currentIndex];
                
                // Add a subtle fade effect
                instructionText.style.opacity = 0;
                setTimeout(() => {
                    instructionText.textContent = current.text;
                    iconSpan.textContent = current.icon;
                    iconSpan.setAttribute('data-icon', current.icon);
                    
                    if (current.status) {
                        instructionStatus.textContent = current.status;
                        instructionStatus.className = `font-label-md text-label-md font-bold ${current.color} mb-1 uppercase tracking-wider`;
                        document.querySelector('.animate-spin').style.display = 'none';
                        document.querySelector('.camera-overlay').style.backgroundColor = 'rgba(16, 185, 129, 0.2)'; // slight green tint on success
                    }
                    
                    instructionText.style.opacity = 1;
                    currentIndex++;
                }, 300);
            }
        }

        // Cycle through instructions every 3.5 seconds
        setInterval(updateInstruction, 3500);
    </script>

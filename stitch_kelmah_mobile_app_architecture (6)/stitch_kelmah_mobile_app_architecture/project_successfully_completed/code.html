<style>

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ffd700;
            opacity: 0;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { top: -10px; opacity: 1; transform: rotate(0deg); }
            100% { top: 100%; opacity: 0; transform: rotate(360deg); }
        }
        @keyframes scaleIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('confetti-container');
            const colors = ['#ffd700', '#1a1c1c', '#705d00', '#e2e2e2'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                const startLeft = Math.random() * 100;
                const animDuration = 2 + Math.random() * 3;
                const animDelay = Math.random() * 1;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                confetti.style.left = `${startLeft}%`;
                confetti.style.animationDuration = `${animDuration}s`;
                confetti.style.animationDelay = `${animDelay}s`;
                confetti.style.backgroundColor = color;
                
                // Randomize shape a bit
                if(Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }
                
                container.appendChild(confetti);
            }
        });
    </script>

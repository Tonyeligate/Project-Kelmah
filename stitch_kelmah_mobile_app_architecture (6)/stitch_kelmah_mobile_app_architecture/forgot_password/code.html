<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop bg-grid-pattern relative overflow-hidden">
<!-- Subtle background accent for depth -->
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] rounded-full bg-primary-container/10 blur-[100px] pointer-events-none"></div>
<!-- Main Card Container -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.04)] border border-surface-container-high p-8 md:p-10 relative z-10">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-8">
<div class="flex items-center justify-center w-12 h-12 bg-primary-container rounded-DEFAULT mb-4">
<span class="material-symbols-outlined text-on-primary-fixed" style="font-variation-settings: 'FILL' 1;">
                    lock_reset
                </span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface mb-2 text-center">
                Reset Password
            </h1>
<p class="font-body-md text-body-md text-text-body text-center">
                Enter your registered email address below. We'll send you a secure link to reset your password.
            </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6" id="resetForm" onsubmit="event.preventDefault(); handleFormSubmit();">
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant">
                        mail
                    </span>
<input class="w-full h-touch-target pl-12 pr-4 bg-surface-container-lowest border border-surface-container-highest rounded-DEFAULT font-body-md text-body-md text-on-surface focus:outline-none focus:border-on-surface focus:ring-2 focus:ring-primary-container/30 transition-all placeholder:text-surface-dim" id="email" name="email" placeholder="e.g., kojo.mensah@example.com" required="" type="email"/>
</div>
</div>
<button class="h-touch-target w-full bg-primary-container text-on-primary-fixed rounded-DEFAULT flex items-center justify-center gap-2 transition-all active:scale-[0.98] hover:bg-primary-fixed hover:shadow-md mt-2" id="submitBtn" type="submit">
<span class="font-headline-md text-[16px] font-bold" id="btnText">Send Reset Link</span>
<span class="material-symbols-outlined" id="btnIcon">arrow_forward</span>
</button>
<!-- Success Message (Hidden by default) -->
<div class="hidden bg-status-success/10 border border-status-success/20 p-4 rounded-DEFAULT flex items-start gap-3 mt-2" id="successMessage">
<span class="material-symbols-outlined text-status-success mt-0.5" style="font-variation-settings: 'FILL' 1;">
                    check_circle
                </span>
<p class="font-body-md text-[14px] leading-tight text-on-surface">
                    If an account exists for that email, a reset link has been sent. Please check your inbox.
                </p>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 pt-6 border-t border-surface-container-high flex justify-center">
<a class="font-label-md text-label-md text-text-body hover:text-primary flex items-center gap-1 transition-colors group" href="#">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">
                    arrow_back
                </span>
                Return to Login
            </a>
</div>
</main>
<script>
        function handleFormSubmit() {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const successMsg = document.getElementById('successMessage');
            const emailInput = document.getElementById('email');

            // Loading state
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btnText.textContent = 'Sending...';
            btnIcon.textContent = 'hourglass_empty';
            btnIcon.classList.add('animate-spin');
            
            // Simulate API call
            setTimeout(() => {
                // Success state
                btn.classList.add('hidden');
                emailInput.disabled = true;
                emailInput.classList.add('bg-surface-container-low', 'opacity-70');
                
                successMsg.classList.remove('hidden');
                successMsg.classList.add('animate-fade-in');
            }, 1500);
        }
    </script>
</body></html>

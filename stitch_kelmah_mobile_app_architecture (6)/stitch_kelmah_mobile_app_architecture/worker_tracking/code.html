<!-- Not visible as this is a Task-Focused sub-page (Tracking) -->
<script>
        // Micro-interaction for the map marker
        const workerMarker = document.querySelector('.pulse-marker').parentElement;
        
        // Simulating subtle movement
        let angle = 0;
        setInterval(() => {
            angle += 0.05;
            const offsetX = Math.sin(angle) * 5;
            const offsetY = Math.cos(angle) * 3;
            workerMarker.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
        }, 50);

        // Interaction for Call/Chat buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', function() {
                const label = this.innerText.trim();
                if(label === 'Call') {
                    console.log('Initiating call to Emmanuel...');
                } else if(label === 'Chat') {
                    console.log('Opening chat session...');
                }
            });
        });
    </script>

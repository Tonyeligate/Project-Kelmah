<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .floating-label-container:focus-within label,
        .floating-label-container input:not(:placeholder-shown) + label {
            transform: translateY(-24px) scale(0.85);
            color: #705d00;
            background-color: #f9f9f9;
            padding: 0 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col">
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-10 max-w-md mx-auto w-full">
<!-- Branding Section -->
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary-container rounded-xl shadow-md mb-6 transition-transform hover:scale-105 duration-300">
<span class="material-symbols-outlined text-[48px] text-on-primary-container" style="font-variation-settings: 'FILL' 1;">construction</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Kelmah</h1>
<p class="mt-4 font-body-md text-text-body px-4">Welcome back to Ghana's #1 Artisan Marketplace</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-6">
<!-- Email Field -->
<div class="relative floating-label-container group">
<input class="block w-full h-touch-target px-4 bg-transparent border border-outline rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all peer" id="email" placeholder=" " type="email"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-label-md pointer-events-none transition-all duration-200 origin-left" for="email">Email Address</label>
</div>
<!-- Password Field -->
<div class="relative floating-label-container group">
<input class="block w-full h-touch-target px-4 bg-transparent border border-outline rounded-lg text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all peer" id="password" placeholder=" " type="password"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant font-label-md pointer-events-none transition-all duration-200 origin-left" for="password">Password</label>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined" id="password-toggle-icon">visibility</span>
</button>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-md text-primary hover:underline transition-all" href="#">Forgot Password?</a>
</div>
<!-- Primary Login Button -->
<button class="w-full h-touch-target bg-primary-container text-on-primary-container font-headline-md text-[16px] rounded-lg shadow-sm active:scale-95 transition-all flex items-center justify-center gap-2 hover:bg-opacity-90">
                Login
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-caption text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-touch-target border border-outline rounded-lg hover:bg-surface-container transition-colors active:scale-95 duration-100">
<img alt="Google" class="w-6 h-6 mr-2" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBwHxwWZh47-kxI8uMYHmP-j6-gCkIW5QXye9A47SctJmQX4ukKAZD7KliDOAHRxMGl9Jq_vJYPcYh0Df785GvW8Au4PUGQ7X56eY-eHZsiFhUp76L7LVntVQT5DPPcARNk6h86sxePpTgnbejqAeNGub32bht4paDn79tQZkJUmb07djaBk1AxnbhYIO3vj9aObYK3d5aptZBTCEQaW_5QE70Rx3nqleZwvUvDX1fcF469cMUoCkKx5wYtml2qGdkUSv7KvGFx71Q"/>
<span class="font-label-md text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center h-touch-target bg-[#1A1A1A] text-white rounded-lg hover:bg-black transition-colors active:scale-95 duration-100">
<span class="material-symbols-outlined mr-2" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-label-md">Apple</span>
</button>
</div>
</div>
<!-- Create Account Link -->
<div class="mt-12 text-center">
<p class="font-body-md text-text-body">
                Don't have an account? 
                <a class="font-label-md text-primary hover:underline ml-1" href="#">Create an Account</a>
</p>
</div>
</main>
<!-- Visual Background Element -->
<div class="fixed top-0 right-0 -z-10 opacity-5 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<path d="M100 0H400V300L100 400V0Z" fill="url(#paint0_linear)"></path>
<defs>
<lineargradient gradientunits="userSpaceOnUse" id="paint0_linear" x1="250" x2="250" y1="0" y2="400">
<stop stop-color="#FFD700"></stop>
<stop offset="1" stop-color="#705D00"></stop>
</lineargradient>
</defs>
</svg>
</div>
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        // Lightweight entrance animation
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.style.opacity = '0';
            main.style.transform = 'translateY(20px)';
            main.style.transition = 'all 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
            
            setTimeout(() => {
                main.style.opacity = '1';
                main.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>

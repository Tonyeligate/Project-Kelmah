    <!-- Pre-paint theme bootstrap to avoid flash-of-wrong-theme -->
    <script>
      (function () {
        var STORAGE_KEY = 'kelmah-theme-mode';
        var DARK_COLOR = '#050507';
        var LIGHT_COLOR = '#F9F7ED';
        var MEDIA_QUERY = '(prefers-color-scheme: dark)';

        var isValidMode = function (value) {
          return value === 'dark' || value === 'light';
        };

        var parsePreference = function (rawValue) {
          if (!rawValue) {
            return null;
          }

          if (isValidMode(rawValue)) {
            return { mode: rawValue, updatedAt: 0 };
          }

          try {
            var parsed = JSON.parse(rawValue);
            if (!isValidMode(parsed && parsed.mode)) {
              return null;
            }
            return {
              mode: parsed.mode,
              updatedAt: typeof parsed.updatedAt === 'number' ? parsed.updatedAt : 0,
            };
          } catch (error) {
            return null;
          }
        };

        var collectPreference = function () {
          var candidates = [];

          try {
            var localValue = window.localStorage.getItem(STORAGE_KEY);
            var localPreference = parsePreference(localValue);
            if (localPreference) {
              candidates.push(localPreference);
            }
          } catch (error) {}

          try {
            var sessionValue = window.sessionStorage.getItem(STORAGE_KEY);
            var sessionPreference = parsePreference(sessionValue);
            if (sessionPreference) {
              candidates.push(sessionPreference);
            }
          } catch (error) {}

          var domTheme = document.documentElement.getAttribute('data-theme');
          if (isValidMode(domTheme)) {
            candidates.push({ mode: domTheme, updatedAt: Number.MAX_SAFE_INTEGER });
          }

          if (!candidates.length) {
            return null;
          }

          candidates.sort(function (a, b) {
            return (b.updatedAt || 0) - (a.updatedAt || 0);
          });

          return candidates[0].mode;
        };

        var applyTheme = function (mode) {
          if (!isValidMode(mode)) {
            return;
          }

          document.documentElement.setAttribute('data-theme', mode);
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) {
            themeMeta.setAttribute('content', mode === 'dark' ? DARK_COLOR : LIGHT_COLOR);
          }
        };

        var resolvedMode = collectPreference();
        if (resolvedMode) {
          applyTheme(resolvedMode);
          return;
        }

        var prefersDark = window.matchMedia && window.matchMedia(MEDIA_QUERY).matches;
        applyTheme(prefersDark ? 'dark' : 'light');
      })();
    </script>

  <body>
    <!-- Runtime Configuration Injection -->
    <script>
      const BOOTSTRAP_DEBUG =
        /localhost|127\.0\.0\.1/.test(location.hostname) ||
        location.search.includes('pwa_debug=1');

      const resolveConsoleMethod = (level) => {
        if (typeof console === 'undefined' || typeof console[level] !== 'function') {
          return null;
        }

        return console[level].bind(console);
      };

      const bootstrapLogMethod = resolveConsoleMethod('log');
      const bootstrapWarnMethod = resolveConsoleMethod('warn');

      const bootstrapLog = (...args) => {
        if (BOOTSTRAP_DEBUG && bootstrapLogMethod) {
          bootstrapLogMethod(...args);
        }
      };

      const bootstrapWarn = (...args) => {
        if (BOOTSTRAP_DEBUG && bootstrapWarnMethod) {
          bootstrapWarnMethod(...args);
        }
      };

      const CHUNK_RECOVERY_ATTEMPTS_KEY = 'kelmah:bootstrapChunkRecoveryAttempts';
      const CHUNK_RECOVERY_MAX_ATTEMPTS = 2;
      const CHUNK_RECOVERY_SIGNATURES = [
        'does not provide an export named',
        'Loading chunk',
        'ChunkLoadError',
        'Failed to fetch dynamically imported module',
      ];

      const shouldRecoverChunkMismatch = (message) => {
        if (!message || typeof message !== 'string') {
          return false;
        }

        return CHUNK_RECOVERY_SIGNATURES.some((signature) =>
          message.includes(signature),
        );
      };

      const recoverFromChunkMismatch = async (message) => {
        try {
          const attempts = Number(sessionStorage.getItem(CHUNK_RECOVERY_ATTEMPTS_KEY) || 0);
          if (attempts >= CHUNK_RECOVERY_MAX_ATTEMPTS) {
            bootstrapWarn('[Bootstrap] Chunk recovery attempts exceeded:', message);
            return;
          }

          sessionStorage.setItem(CHUNK_RECOVERY_ATTEMPTS_KEY, String(attempts + 1));

          if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
              type: 'KELMAH_CLEAR_RUNTIME_CACHES',
            });
          }

          if (typeof caches !== 'undefined') {
            const cacheNames = await caches.keys();
            await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
          }
        } catch (_) {
          // Non-fatal: always proceed to reload.
        }

        location.reload();
      };

      window.addEventListener(
        'error',
        (event) => {
          const message = String(event?.message || event?.error?.message || '');
          if (shouldRecoverChunkMismatch(message)) {
            recoverFromChunkMismatch(message);
          }
        },
        true,
      );

      window.addEventListener('unhandledrejection', (event) => {
        const message = String(event?.reason?.message || event?.reason || '');
        if (shouldRecoverChunkMismatch(message)) {
          recoverFromChunkMismatch(message);
        }
      });

      // Load runtime configuration (async — may not be available on initial render)
      (async function() {
        try {
          const response = await fetch('/runtime-config.json');
          if (response.ok) {
            const config = await response.json();
            window.__RUNTIME_CONFIG__ = config;
            bootstrapLog('✅ Runtime config loaded:', config.ngrokUrl);
          }
        } catch (error) {
          bootstrapWarn('⚠️ Failed to load runtime config:', error);
        }
      })();
    </script>
    
    <div id="root"></div>
    
    <!-- 🇬🇭 Service Worker Registration for Ghana Networks -->
    <script>
      // Register service worker for offline functionality (disabled on localhost)
      const shouldRegisterSW = !/localhost|127\.0\.0\.1/.test(location.hostname);
      if ('serviceWorker' in navigator && shouldRegisterSW) {
        window.addEventListener('load', () => {
          // Only register if the script exists
          fetch('/sw.js', { method: 'HEAD' })
            .then((res) => {
              if (!res.ok) throw new Error('SW missing');
              return navigator.serviceWorker.register('/sw.js');
            })
            .then((registration) => {
              bootstrapLog('✅ Service Worker registered successfully:', registration.scope);
              
              // Handle updates
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                      // New update available — dispatch event for React app to show styled notification
                      bootstrapLog('🔄 New app version available');
                      window.dispatchEvent(new CustomEvent('sw:updateAvailable'));
                    }
                  });
                }
              });
            })
            .catch((error) => {
              bootstrapWarn('❌ Service Worker not registered (missing or error):', error?.message || error);
            });
        });

        // Listen for service worker messages
        navigator.serviceWorker.addEventListener('message', (event) => {
          if (event.data && event.data.type === 'CACHE_UPDATED') {
            bootstrapLog('📦 App cache updated');
          }
        });
      } else {
        bootstrapLog('⚠️ Service Worker disabled in development');
      }

      // Handle app installation prompt — dispatch to React for accessible UI
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        bootstrapLog('📱 App install prompt available');
        e.preventDefault();
        deferredPrompt = e;
        // Expose to React via custom event
        window.dispatchEvent(new CustomEvent('pwa:installAvailable'));
      });

      // Install app function — called from React InstallBanner component
      window.installApp = async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          bootstrapLog(`📱 App install outcome: ${outcome}`);
          deferredPrompt = null;
          window.dispatchEvent(new CustomEvent('pwa:installComplete'));
        }
      };

      // Handle app installed event
      window.addEventListener('appinstalled', (evt) => {
        bootstrapLog('🎉 Kelmah app installed successfully!');
        // Track installation analytics
        if (window.gtag) {
          gtag('event', 'app_installed', {
            'custom_parameter': 'kelmah_pwa'
          });
        }
      });

      window.addEventListener('online', () => {
        bootstrapLog('🌐 Back online');
        // Trigger sync for offline actions
        if ('serviceWorker' in navigator && 'sync' in window.ServiceWorkerRegistration.prototype) {
          navigator.serviceWorker.ready.then((registration) => {
            registration.sync.register('sync-offline-data');
          });
        }
      });

      window.addEventListener('offline', () => {
        bootstrapLog('📱 Gone offline');
      });

      bootstrapLog('🇬🇭 Kelmah PWA initialized for Ghana market');
    </script>
    
    <script type="module" src="/src/main.jsx"></script>

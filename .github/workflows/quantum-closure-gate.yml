name: Quantum Closure Gate

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
    branches: [main]
    paths:
      - kelmah-frontend/**
      - spec-kit/quantum-oracle/**
      - .claude/agents/**
      - .github/workflows/**

jobs:
  quantum-closure-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update Learning Trend Report
        run: npm run quantum:aggregate-learning

      - name: Validate Learning Trend Report
        run: |
          node -e "const fs=require('fs'); const p='spec-kit/quantum-oracle/learning-ledger-summary.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); if(!Array.isArray(j.advancedMissingLearningEvidence)){throw new Error('advancedMissingLearningEvidence missing');} if(j.advancedMissingLearningEvidence.length>0){throw new Error('Missing learning evidence for: '+j.advancedMissingLearningEvidence.join(', '));} if(typeof j.learningEnabledTaskCount!=='number'){throw new Error('learningEnabledTaskCount missing');} if(typeof j.learningArtifactTaskCount!=='number'){throw new Error('learningArtifactTaskCount missing');} if(!j.trends||!Array.isArray(j.trends.topRecurringMistakes)){throw new Error('trend payload invalid');} console.log('Learning trend report validation: PASS');"

      - name: Upload Learning Trend Report
        uses: actions/upload-artifact@v4
        with:
          name: learning-ledger-summary
          path: spec-kit/quantum-oracle/learning-ledger-summary.json

      - name: Comment Learning Trend Snapshot
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- quantum-learning-ledger-comment -->';
            const summaryPath = 'spec-kit/quantum-oracle/learning-ledger-summary.json';

            if (!fs.existsSync(summaryPath)) {
              core.setFailed(`Missing ${summaryPath}`);
              return;
            }

            const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
            const topMistakes = (summary.trends?.topRecurringMistakes || []).slice(0, 3);
            const topSignals = (summary.trends?.topRealWorldSignals || []).slice(0, 3);

            const formatList = (items, emptyText) => {
              if (!items.length) return `- ${emptyText}`;
              return items.map((x) => `- ${x.item} (count: ${x.count})`).join('\n');
            };

            const body = [
              marker,
              '## Quantum Learning Snapshot',
              '',
              `- Learning-enabled tasks: ${summary.learningEnabledTaskCount}`,
              `- Tasks with learning artifacts: ${summary.learningArtifactTaskCount}`,
              `- Advanced tasks missing learning evidence: ${(summary.advancedMissingLearningEvidence || []).length}`,
              '',
              '### Top 3 Recurring Mistakes',
              formatList(topMistakes, 'No recurring mistakes recorded yet.'),
              '',
              '### Top 3 Real-World Signals',
              formatList(topSignals, 'No real-world signals recorded yet.'),
              '',
              '_Auto-generated by Quantum Closure Gate workflow._',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Run Quantum PR Closure Gate
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: npm run quantum:check-pr-gate -- --base "$PR_BASE_SHA" --head "$PR_HEAD_SHA"

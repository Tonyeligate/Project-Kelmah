name: Native Mobile Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/mobile-native-validation.yml
      - kelmah-mobile-android/**
      - kelmah-mobile-ios/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/mobile-native-validation.yml
      - kelmah-mobile-android/**
      - kelmah-mobile-ios/**

permissions:
  contents: read

concurrency:
  group: native-mobile-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-validation:
    name: Android build, unit tests, lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kelmah-mobile-android
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Validate Android app
        env:
          KELMAH_GATEWAY_ORIGIN: https://kelmah-api-gateway-qmd7.onrender.com
        run: |
          gradle --version
          gradle testDebugUnitTest assembleDebug lintDebug --stacktrace

  ios-validation:
    name: iOS XcodeGen build and tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: kelmah-mobile-ios
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve simulator destination
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID=$(xcrun simctl list devices available | grep -E 'iPhone (16|15)' | head -n 1 | sed -E 's/.*\(([0-9A-F-]+)\) \(.*/\1/')
          if [ -z "$SIMULATOR_ID" ]; then
            echo "Unable to find an available iPhone simulator on the runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "simulator_id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"

      - name: Run iOS unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project Kelmah.xcodeproj \
            -scheme Kelmah \
            -destination "id=${{ steps.simulator.outputs.simulator_id }}" \
            -only-testing:KelmahTests \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS authentication smoke UI test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Kelmah.xcodeproj \
            -scheme Kelmah \
            -destination "id=${{ steps.simulator.outputs.simulator_id }}" \
            -only-testing:KelmahUITests/testAuthenticationShellLoadsAndSupportsModeSwitching \
            CODE_SIGNING_ALLOWED=NO

name: Native Mobile Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/mobile-native-validation.yml
      - kelmah-mobile-android/**
      - kelmah-mobile-ios/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/mobile-native-validation.yml
      - kelmah-mobile-android/**
      - kelmah-mobile-ios/**

permissions:
  contents: read

concurrency:
  group: native-mobile-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  android-validation:
    name: Android build, unit tests, lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kelmah-mobile-android
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Validate Android app
        env:
          KELMAH_GATEWAY_ORIGIN: https://kelmah-api-gateway-qmd7.onrender.com
        run: |
          ./gradlew --version
          ./gradlew testDebugUnitTest --stacktrace --no-daemon
          ./gradlew assembleDebug --stacktrace --no-daemon
          ./gradlew assembleDebugAndroidTest --stacktrace --no-daemon
          ./gradlew lintDebug --stacktrace --no-daemon

      - name: Upload Android validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-native-validation
          if-no-files-found: warn
          path: |
            kelmah-mobile-android/app/build/outputs/apk/debug/*.apk
            kelmah-mobile-android/app/build/reports/tests/testDebugUnitTest/**
            kelmah-mobile-android/app/build/test-results/testDebugUnitTest/**
            kelmah-mobile-android/app/build/reports/lint-results-debug.*
            kelmah-mobile-android/app/build/reports/lint-results-debug/**

  android-connected-tests:
    name: Android connected instrumentation tests
    runs-on: ubuntu-latest
    needs: android-validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android emulator packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0" "emulator" "system-images;android-35;google_apis;x86_64"

      - name: Run connected instrumentation tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        env:
          KELMAH_GATEWAY_ORIGIN: https://kelmah-api-gateway-qmd7.onrender.com
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_7
          emulator-boot-timeout: 900
          disable-animations: true
          script: |
            cd kelmah-mobile-android
            ./gradlew connectedDebugAndroidTest --stacktrace --no-daemon

      - name: Upload Android connected test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-connected-tests
          if-no-files-found: warn
          path: |
            kelmah-mobile-android/app/build/reports/androidTests/connected/**
            kelmah-mobile-android/app/build/outputs/androidTest-results/connected/**
            kelmah-mobile-android/app/build/test-results/connected/**
            kelmah-mobile-android/app/build/outputs/androidTest-results/managedDevice/**

  ios-validation:
    name: iOS build-for-testing and tests
    runs-on: macos-latest
    defaults:
      run:
        working-directory: kelmah-mobile-ios
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve simulator destination
        id: simulator
        run: |
          set -euo pipefail
          SIMULATOR_ID=$(xcrun simctl list devices available | grep -E 'iPhone (16|15|14)' | head -n 1 | sed -E 's/.*\(([0-9A-F-]+)\) \(.*/\1/')
          if [ -z "$SIMULATOR_ID" ]; then
            echo "Unable to find an available iPhone simulator on the runner."
            xcrun simctl list devices available
            exit 1
          fi
          echo "simulator_id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"

      - name: Build iOS app for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Kelmah.xcodeproj \
            -scheme Kelmah \
            -destination "id=${{ steps.simulator.outputs.simulator_id }}" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS unit tests
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Kelmah.xcodeproj \
            -scheme Kelmah \
            -destination "id=${{ steps.simulator.outputs.simulator_id }}" \
            -derivedDataPath build/DerivedData \
            -only-testing:KelmahTests \
            -resultBundlePath build/KelmahTests.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Run iOS authentication smoke UI test
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Kelmah.xcodeproj \
            -scheme Kelmah \
            -destination "id=${{ steps.simulator.outputs.simulator_id }}" \
            -derivedDataPath build/DerivedData \
            -only-testing:KelmahUITests/testAuthenticationShellLoadsAndSupportsModeSwitching \
            -resultBundlePath build/KelmahUITests.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-native-validation
          if-no-files-found: warn
          path: |
            kelmah-mobile-ios/build/KelmahTests.xcresult/**
            kelmah-mobile-ios/build/KelmahUITests.xcresult/**
            kelmah-mobile-ios/build/DerivedData/Logs/Test/**
